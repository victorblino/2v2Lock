name: Build Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Checkout Deadworks source
        shell: pwsh
        run: git clone --depth 1 https://github.com/Deadworks-net/deadworks.git "$env:RUNNER_TEMP\deadworks-src"

      - name: Build DeadworksManaged.Api
        shell: pwsh
        run: dotnet build "$env:RUNNER_TEMP\deadworks-src\managed\DeadworksManaged.Api\DeadworksManaged.Api.csproj" -c Release

      - name: Build 2v2Lock
        shell: pwsh
        run: >
          dotnet build .\2v2Lock.csproj -c Release
          -p:DeadworksApiHintPath="$env:RUNNER_TEMP\deadworks-src\managed\DeadworksManaged.Api\bin\Release\net10.0\DeadworksManaged.Api.dll"

      - name: Package plugin
        shell: pwsh
        run: |
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE "plugins\2v2Lock"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          Copy-Item ".\bin\Release\net10.0\2v2Lock.dll" $packageRoot
          Copy-Item ".\bin\Release\net10.0\2v2Lock.pdb" $packageRoot
          Copy-Item ".\bin\Release\net10.0\config.json" $packageRoot

          Compress-Archive -Path $packageRoot -DestinationPath ".\2v2Lock.zip" -Force

      - name: Upload plugin folder
        uses: actions/upload-artifact@v4
        with:
          name: 2v2Lock-plugin
          path: plugins/2v2Lock

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: 2v2Lock-zip
          path: 2v2Lock.zip

      - name: Publish prerelease
        if: github.event_name != 'pull_request' && github.ref_name == 'main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "latest"
          $title = "2v2Lock Latest Build"
          $notes = "Automated build from the latest main branch commit."

          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag ".\2v2Lock.zip" `
              --repo "${{ github.repository }}" `
              --title $title `
              --notes $notes `
              --prerelease
          }
          else {
            gh release upload $tag ".\2v2Lock.zip" `
              --repo "${{ github.repository }}" `
              --clobber
          }
